name: 每日股市數據抓取

on:
  schedule:
    # 每天台灣時間下午 3:10 執行
    - cron: '10 7 * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 檢出倉庫內容
        uses: actions/checkout@v4

      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安裝必要套件
        run: |
          pip install yfinance pandas

      - name: 執行每日抓取
        run: |
          python - <<EOF
          import yfinance as yf
          import pandas as pd
          # 抓取加權指數最新 60 天數據
          df = yf.download("^TWII", period="400d")
          df.reset_index(inplace=True)
          df.to_csv("taiex_data.csv", index=False)
          EOF

      - name: 將數據存回倉庫
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add *.csv
          git commit -m "自動更新每日量價數據" || exit 0
          git push


      - name: 發送通知到 Issue #1
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 1,
              body: `📊 TAIEX 資料已更新（含上一年度 + 當年度）

              📥 一鍵下載 CSV：${{ github.server_url }}/${{ github.repository }}/raw/main/taiex_data.csv

              您可以點擊上方連結下載 CSV 檔案。`
            })
