name: 每日股市數據抓取

on:
  schedule:
    # 每天台灣時間下午 3:10 執行 (國際標準時 07:10)
    - cron: '10 7 * * *'
  workflow_dispatch: # 讓你可以手動點擊執行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 檢出倉庫內容
        uses: actions/checkout@v4

      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安裝必要套件
        run: |
          pip install yfinance pandas

      - name: 執行抓取腳本
        run: |
          python - <<EOF
          import yfinance as yf
          import pandas as pd
          
          # 抓取加權指數 (TAIEX) 最近 60 天數據
          # 這裡抓取的是日線資料，體積很小，不用擔心空間
          df = yf.download("^TWII", period="60d")
          df.reset_index(inplace=True)
          
          # 存成 CSV 格式，方便 AI 讀取
          df.to_csv("taiex_data.csv", index=False)
          print("數據抓取成功！")
          EOF

      - name: 將數據存回倉庫
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add taiex_data.csv
          git commit -m "自動更新每日量價數據" || exit 0
          git push
