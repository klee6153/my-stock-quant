name: TAIEX歷史數據

on:
  schedule:
    # 每週六凌晨 2:00 執行（UTC時間週五18:00，台灣時間週六凌晨2:00）
    - cron: '0 18 * * 5'
  workflow_dispatch:  # 保留手動執行按鈕

jobs:
  fetch-history:
    runs-on: ubuntu-latest
    steps:
      - name: 檢出倉庫內容
        uses: actions/checkout@v4

      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安裝必要套件
        run: |
          pip install yfinance pandas

      - name: 抓取TAIEX完整歷史數據
        run: |
          python - <<EOF
          import yfinance as yf
          import pandas as pd
          from datetime import datetime
          
          print("開始抓取 TAIEX 歷史數據...")
          
          # 抓取加權指數從最早可用日期到今天的所有數據
          df = yf.download("^TWII", period="max")
          
          # 重設索引，讓日期變成一欄
          df.reset_index(inplace=True)
          
          # 儲存為 CSV 檔案
          df.to_csv("TAIEX_歷史數據.csv", index=False)
          
          # 顯示統計資訊
          print(f"✓ 抓取完成！")
          print(f"  總筆數：{len(df)} 筆")
          print(f"  起始日期：{df['Date'].min()}")
          print(f"  結束日期：{df['Date'].max()}")
          EOF

      - name: 壓縮 CSV 檔案（節省空間）
        run: |
          gzip -c TAIEX_歷史數據.csv > TAIEX_歷史數據.csv.gz
          echo "壓縮完成，原始大小：$(ls -lh TAIEX_歷史數據.csv | awk '{print $5}')，壓縮後：$(ls -lh TAIEX_歷史數據.csv.gz | awk '{print $5}')"

      - name: 發送通知到 Issue #1
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toLocaleString('zh-TW', { timeZone: 'Asia/Taipei' }).slice(0,10);
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 1,
              body: `📚 **TAIEX 完整歷史數據已更新** - ${today}
              
              📥 **一鍵下載 CSV 檔案**：
              ${{ github.server_url }}/${{ github.repository }}/raw/main/TAIEX_歷史數據.csv
              
              🗜️ **如果不方便下載，也可下載壓縮版**（檔案較小）：
              ${{ github.server_url }}/${{ github.repository }}/raw/main/TAIEX_歷史數據.csv.gz
              
              📊 本檔案包含從最早日期到 ${today} 的所有 TAIEX 歷史量價數據。
              
              ⚠️ 注意：CSV 檔案可能較大（數萬筆資料），建議使用 Excel、Python 或資料庫軟體開啟。`
            })
