name: 每日重大訊息

on:
  schedule:
    - cron: '30 21 * * *'
  workflow_dispatch:

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    
    steps:
      - name: 檢出倉庫
        uses: actions/checkout@v4

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安裝套件
        run: |
          pip install requests beautifulsoup4 pandas

      - name: 抓取即時重大訊息
        run: |
          python - <<EOF
          import requests
          from bs4 import BeautifulSoup
          import pandas as pd
          from datetime import datetime

          stock_code = "4416"
          url = f"https://mops.twse.com.tw/mops/web/t146sb10?stockId={stock_code}"

          headers = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
              'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9',
          }

          session = requests.Session()
          session.get("https://mops.twse.com.tw", headers=headers)
          response = session.get(url, headers=headers)
          response.encoding = 'utf-8'

          soup = BeautifulSoup(response.text, 'html.parser')
          news_list = []

          table = soup.find('table', class_='evenTable')
          if table:
              rows = table.find_all('tr')[1:]
              for row in rows:
                  cells = row.find_all('td')
                  if len(cells) >= 2:
                      datetime_str = cells[0].get_text(strip=True)
                      title_cell = cells[1]
                      title = title_cell.get_text(strip=True) if title_cell else ""
                      if title and len(title) > 5:
                          news_list.append({'date': datetime_str, 'title': title})

          df = pd.DataFrame(news_list)
          df.to_csv('4416_重大訊息.csv', index=False, encoding='utf-8-sig')
          print(f"已儲存 {len(news_list)} 則重大訊息")
          EOF

      - name: 提交檔案
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add 4416_重大訊息.csv
          git commit -m "自動更新重大訊息" || exit 0
          git push

      - name: 發送通知
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toLocaleString('zh-TW', { timeZone: 'Asia/Taipei' });
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 1,
              body: `📢 **4416 即時重大訊息** - ${today}\n\n📥 下載連結：${{ github.server_url }}/${{ github.repository }}/raw/main/4416_重大訊息.csv\n\n💡 請點擊上方連結下載 CSV 檔案。`
            });
