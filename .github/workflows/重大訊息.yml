name: 每日重大訊息

on:
  schedule:
    - cron: '30 21 * * *'
  workflow_dispatch:

jobs:
  permissions:
    contents: write
    issues: write
  fetch-news:
    runs-on: ubuntu-latest
    
    steps:
      - name: 檢出倉庫
        uses: actions/checkout@v4

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安裝套件
        run: |
          pip install requests beautifulsoup4 lxml pandas

      - name: 執行重大訊息抓取
        run: |
          python - <<EOF
          import requests
          from bs4 import BeautifulSoup
          import pandas as pd
          from datetime import datetime, timedelta
          import time
          
          stock_code = "4416"
          
          end_date = datetime.now()
          start_date = end_date - timedelta(days=7)
          
          start_year = start_date.year - 1911
          start_month = start_date.month
          start_day = start_date.day
          end_year = end_date.year - 1911
          end_month = end_date.month
          end_day = end_date.day
          
          url = "https://mops.twse.com.tw/mops/web/t05st02"
          
          headers = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
              'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9',
              'Accept-Language': 'zh-TW,zh;q=0.9',
          }
          
          form_data = {
              'step': '1',
              'firstin': '1',
              'off': '1',
              'co_id': stock_code,
              'year': str(start_year),
              'month': str(start_month),
              'day': str(start_day),
              'year_end': str(end_year),
              'month_end': str(end_month),
              'day_end': str(end_day),
          }
          
          session = requests.Session()
          session.get("https://mops.twse.com.tw", headers=headers)
          time.sleep(2)
          
          response = session.post(url, data=form_data, headers=headers)
          response.encoding = 'utf-8'
          
          soup = BeautifulSoup(response.text, 'html.parser')
          news_list = []
          
          rows = soup.find_all('tr', class_='hasRowspan')
          
          for row in rows:
              cells = row.find_all('td')
              if len(cells) >= 3:
                  date_text = cells[0].get_text(strip=True)
                  title = cells[2].get_text(strip=True)
                  if title and len(title) > 5:
                      news_list.append({'date': date_text, 'title': title})
          
          df = pd.DataFrame(news_list)
          df.to_csv(f"{stock_code}_重大訊息.csv", index=False, encoding='utf-8-sig')
          print(f"已儲存 {len(news_list)} 則重大訊息")
          EOF

      - name: 提交 CSV 檔案
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add *.csv
          git commit -m "自動更新重大訊息" || exit 0
          git push

      - name: 發送通知
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toLocaleString('zh-TW', { timeZone: 'Asia/Taipei' });
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 1,
              body: `📢 **重大訊息已更新** - ${today}
              
              📥 下載連結：${{ github.server_url }}/${{ github.repository }}/raw/main/4416_重大訊息.csv
              
              💡 請點擊上方連結下載 CSV 檔案。`
            })
